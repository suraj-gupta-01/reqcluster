version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: reqcluster-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./embeddings:/app/embeddings
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: reqcluster-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
