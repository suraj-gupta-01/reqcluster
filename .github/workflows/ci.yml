name: CI

on:
  push:
    branches: [main, hikki]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest pytest-cov
      - name: Run tests with coverage
        run: pytest --cov=backend --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        # npm install (not npm ci): the lockfile is generated on Windows and
        # npm ci's strict match fails on Linux over platform-specific optional
        # deps (@emnapi/*). npm install resolves them cross-platform.
        run: npm install --no-audit --no-fund
      - name: Build frontend
        working-directory: frontend
        run: npm run build
